name: Content sync

# Nightly scrape of www.refugiodelsatiro.es → frontend/public/content-mirror/.
# Commits straight to `development`, which triggers `deploy.yml` and re-seeds
# the VPS content cache. Editors see their Sites changes live after the next
# run (≤24h) without any manual step. Manual `workflow_dispatch` is also
# available from the Actions tab for on-demand refreshes.
#
# Requires `CONTENT_SYNC_PAT`: a fine-grained PAT with
# `contents: write` on this repo. The default GITHUB_TOKEN can't trigger
# downstream workflows (deploy.yml) on its own commits, so we use a PAT.

on:
  schedule:
    - cron: "17 3 * * *"  # 03:17 UTC daily
  workflow_dispatch:

concurrency:
  group: content-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - name: Check out development
        uses: actions/checkout@v4
        with:
          ref: development
          token: ${{ secrets.CONTENT_SYNC_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scraper
        run: python -m scraper run

      - name: Commit if changed
        id: commit
        run: |
          set -e
          git config user.name "refugio-content-bot"
          git config user.email "noreply@refugiodelsatiro.es"
          git add frontend/public/content-mirror
          if git diff --cached --quiet; then
            echo "No content changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "chore(content): sync from Sites ${TODAY}"
          git push origin development
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Content sync failed ${today}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The nightly content-sync workflow failed.',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Likely causes:',
                '- Google Sites restructured the page HTML (strip selectors need updating).',
                '- An upstream page returned an HTTP error.',
                '- Network failure.',
                '',
                'Inspect the run logs and update `scraper/config.py` if needed.',
              ].join('\n'),
              labels: ['content-sync', 'automation'],
            });
