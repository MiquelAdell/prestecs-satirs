services:
  - type: web
    name: prestecs-satirs
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn backend.api.app:create_app --factory --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: NODE_VERSION
        value: "20"
      - key: PRESTECS_JWT_SECRET
        generateValue: true
      - key: PRESTECS_BASE_URL
        value: https://prestecs-satirs.onrender.com
      - key: PRESTECS_DB_PATH
        value: /opt/render/project/data/prestecs.db
    disk:
      name: prestecs-data
      mountPath: /opt/render/project/data
      sizeGB: 1
